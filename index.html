<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  
  <!-- Adaptation + blocage du zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>SNT exemple</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .bandeau.haut {
      background-color: black;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .bandeau.paragraphe {
      padding: 20px;
      text-align: center;
    }

    .objectif {
      margin-top: 20px;
      padding: 15px;
      background-color: #f0f0f0;
      border-radius: 10px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="bandeau haut">
    <h1>Bienvenue</h1>
  </div>

  <div class="bandeau paragraphe">
    <p>Ceci est pour Sasha 🤪. J'espère que l'éval n'est pas trop compliquée.</p>

    <div class="objectif">
      <h2>Objectif</h2>
      <p>Créer une page web responsive qui s’adapte à la taille de l’écran sans zoom, tout en restant lisible sur téléphone et ordinateur.</p>
    </div>
  </div>

</body>
</html>
