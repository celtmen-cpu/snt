<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>useless facts</title>
</head>

<body>

  <div class="bandeau haut">
    <h1 data-fr="Faits inutiles" data-en="Useless Fact"></h1>
  </div>

  <div class="bandeau paragraphe">
    <p data-fr="Ce site web propose une collection de faits inutiles mais interessants. Il a été crée pour permettre d'apprendre le html." data-en="This website offers a collection of useless facts."></p>
  </div>
  <button id="langBtn" onclick="toggleLang()">English Version</button>
</body>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: white;
    color: black;
  }

  .bandeau.haut {
    background-color: black;
    color: white;
    padding: 20px;
    text-align: center;
    border-radius: 12px;
  }

  .bandeau.paragraphe {
    padding: 20px;
    text-align: center;
    background-color: white
  }
</style>

<script>
  let lang = "fr";

  function updateText(){
    document.querySelectorAll("[data-fr]").forEach(el => {
      el.textContent = el.getAttribute("data-"+lang);
    });

    const btn = document.getElementById("langBtn");
    btn.textContent = lang === "fr" ? "English Version" : "Version Française";
  }

  function toggleLang(){
    lang = lang === "fr" ? "en" : "fr";
    updateText();
  }
  updateText();
</script>
</html>
